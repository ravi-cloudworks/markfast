<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sets — Class XI Crash Course</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/theme/black.min.css" id="theme-base">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#10142A;
    --panel:#181D3B;
    --panel-2:#20264A;
    --text:#EEEFF7;
    --muted:#9FA3C4;
    --gold:#E8B84B;
    --teal:#5FD4C4;
    --rose:#E86A82;
    --line: rgba(255,255,255,0.08);
    --radius: 14px;
  }
  html, body { background: var(--ink) !important; }
  .reveal { font-family: 'Inter', sans-serif; color: var(--text); }
  .reveal .slides { text-align: left; }
  .reveal h1, .reveal h2, .reveal h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    text-transform: none;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .reveal h1 { font-size: 1.9em; }
  .reveal h2 { font-size: 1.4em; margin-bottom: 0.25em; }
  .reveal h3 { font-size: 1.05em; color: var(--teal); }
  .reveal p, .reveal li { font-size: 0.68em; line-height: 1.35; color: var(--text); }
  .reveal ul { margin-left: 0.4em; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.42em;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4em;
    display: block;
  }
  .hook {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.72em;
    color: var(--muted);
    border-left: 3px solid var(--teal);
    padding-left: 0.5em;
    margin: 0.4em 0;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 0.6em 0.8em;
    margin: 0.35em 0;
  }
  .card-trick {
    background: linear-gradient(135deg, rgba(232,184,75,0.12), rgba(232,184,75,0.03));
    border: 1px solid rgba(232,184,75,0.35);
    border-radius: var(--radius);
    padding: 0.5em 0.7em;
    margin: 0.25em 0;
    font-size: 0.62em;
  }
  .notation-tag {
    font-family: 'JetBrains Mono', monospace;
    background: var(--panel-2);
    border-radius: 8px;
    padding: 0.2em 0.45em;
    display: inline-block;
    margin: 0.15em 0.2em 0.15em 0;
    font-size: 0.58em;
    color: var(--teal);
  }
  .example-q { color: var(--gold); font-weight: 600; margin-bottom: 0.25em; }
  .example-step { color: var(--muted); font-size: 0.62em; margin: 0.1em 0; }
  .example-answer {
    margin-top: 0.3em;
    padding: 0.4em 0.6em;
    background: rgba(95,212,196,0.1);
    border-left: 3px solid var(--teal);
    border-radius: 6px;
  }

  /* Venn progress signature */
  #venn-progress {
    position: fixed;
    top: 16px; right: 20px;
    z-index: 50;
    opacity: 0.85;
  }
  .chapter-nav {
    position: fixed;
    bottom: 14px; left: 20px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 0.6em;
    flex-wrap: wrap;
    max-width: 60vw;
  }
  .chapter-nav img { height: 22px; width: auto; display: block; opacity: 0.92; }
  .chapter-nav .switch-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0.3em 0.6em;
    text-decoration: none;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  a.switch-link:hover { color: var(--teal); border-color: var(--teal); }
  .chapter-nav .switch-link.active {
    color: var(--ink);
    background: var(--teal);
    border-color: var(--teal);
    font-weight: 600;
    cursor: default;
  }

  /* Quiz */
  .quiz-box { max-width: 850px; }
  .quiz-q { font-size: 0.8em; margin-bottom: 0.5em; }
  .quiz-opt {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 0.4em 0.65em;
    margin: 0.25em 0;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.6em;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .quiz-opt:hover { border-color: var(--teal); }
  .quiz-opt.correct { background: rgba(95,212,196,0.18); border-color: var(--teal); }
  .quiz-opt.wrong { background: rgba(232,106,130,0.18); border-color: var(--rose); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback {
    margin-top: 0.4em;
    padding: 0.4em 0.65em;
    border-radius: 8px;
    font-size: 0.6em;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(95,212,196,0.12); border-left: 3px solid var(--teal); }
  .quiz-feedback.bad { background: rgba(232,106,130,0.12); border-left: 3px solid var(--rose); }

  .score-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58em;
    color: var(--gold);
    margin-top: 0.6em;
    display: block;
  }

  .video-placeholder {
    aspect-ratio: 16/9;
    max-width: 480px;
    background: repeating-linear-gradient(135deg, var(--panel), var(--panel) 10px, var(--panel-2) 10px, var(--panel-2) 20px);
    border: 1px dashed var(--muted);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.35em;
    margin-top: 0.5em;
  }
  .video-placeholder span { font-family: 'JetBrains Mono', monospace; font-size: 0.55em; color: var(--muted); }

  .diagram-wrap {
    margin-top: 0.45em;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.25em;
  }
  .diagram-wrap svg { background: transparent; max-width: 260px; height: auto; }
  .diagram-caption {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55em;
    color: var(--muted);
  }

  .module-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6em;
    color: var(--ink);
    background: var(--teal);
    padding: 0.15em 0.5em;
    border-radius: 6px;
    display: inline-block;
    margin-right: 0.4em;
  }
</style>
</head>
<body>

<div class="chapter-nav">
  <a href="../../class-11-math.html"><img src="../../assets/logo.png" alt="Mark Fast — back to chapters"></a>
  <span class="switch-link active">📘 Chapter</span>
  <a class="switch-link" href="questions.html">✍️ Book Questions</a>
</div>

<svg id="venn-progress" width="70" height="40" viewBox="0 0 70 40">
  <circle id="venn-a" cx="27" cy="20" r="17" fill="none" stroke="#5FD4C4" stroke-width="2"/>
  <circle id="venn-b" cx="43" cy="20" r="17" fill="none" stroke="#E8B84B" stroke-width="2"/>
</svg>

<div class="reveal">
  <div class="slides" id="slides"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/plugin/math/math.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/plugin/notes/notes.min.js"></script>

<script src="../../assets/diagrams/venn.js"></script>
<script src="../../assets/diagrams/arrow-diagram.js"></script>
<script src="../../assets/diagrams/cartesian-grid.js"></script>
<script src="../../assets/diagrams/function-graph.js"></script>
<script src="../../assets/diagrams/registry.js"></script>

<script>
const STORAGE_KEY = 'sets_course_progress_v1';

function loadProgress(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveProgress(p){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e){}
}
let progress = loadProgress();

function esc(s){ return s; } // content is trusted, math delimiters kept intact

function renderMarkdownish(text){
  // minimal: **bold**, newlines -> <br>, keep $...$ / $$...$$ for KaTeX
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--gold)">$1</strong>')
    .replace(/\n/g, '<br>');
}

// Diagram rendering (renderDiagram + renderVennSVG) now lives in
// assets/diagrams/*.js, loaded via <script> tags above — see registry.js.

function quizSlideHTML(question, qIndex, uniqueId){
  const opts = question.options.map((opt, i) => `
    <button class="quiz-opt" data-idx="${i}" onclick="handleQuizAnswer('${uniqueId}', ${i}, ${question.correct})">
      ${String.fromCharCode(65+i)}.  ${opt}
    </button>`).join('');
  return `
    <section data-quiz-id="${uniqueId}">
      <span class="eyebrow">Quick Check · Q${qIndex+1}</span>
      <div class="quiz-box">
        <div class="quiz-q">${renderMarkdownish(question.q)}</div>
        ${opts}
        <div class="quiz-feedback" id="fb-${uniqueId}"></div>
      </div>
    </section>`;
}

// stash feedback data globally keyed by uniqueId
window.QUIZ_DATA = {};

function handleQuizAnswer(uniqueId, chosenIdx, correctIdx){
  const data = window.QUIZ_DATA[uniqueId];
  const section = document.querySelector(`section[data-quiz-id="${uniqueId}"]`);
  const buttons = section.querySelectorAll('.quiz-opt');
  buttons.forEach(b => b.disabled = true);
  const fb = section.querySelector('.quiz-feedback');

  buttons[correctIdx].classList.add('correct');

  if(chosenIdx === correctIdx){
    fb.classList.add('show','ok');
    fb.innerHTML = "✅ Correct. " + (data.feedback && data.feedback[String(chosenIdx)] ? renderMarkdownish(data.feedback[String(chosenIdx)]) : "Well done.");
    progress[uniqueId] = 1;
  } else {
    buttons[chosenIdx].classList.add('wrong');
    fb.classList.add('show','bad');
    const specific = data.feedback && data.feedback[String(chosenIdx)];
    fb.innerHTML = "❌ Not quite. " + (specific ? renderMarkdownish(specific) : "Review the concept slide above and try the next question.");
    progress[uniqueId] = 0;
  }
  saveProgress(progress);
  if(window.renderMathInElement){
    renderMathInElement(fb, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});
  }
  updateVennProgress();
}

function moduleSlidesHTML(mod){
  let html = '';

  // Hook + definition slide
  html += `
    <section>
      <span class="eyebrow">${mod.eyebrow}</span>
      <h2>${mod.title}</h2>
      <div class="hook">${renderMarkdownish(mod.hook)}</div>
      <div class="card">
        <p>${renderMarkdownish(mod.definition)}</p>
      </div>
      <div>
        ${mod.notation.map(n => `<span class="notation-tag">${n}</span>`).join('')}
      </div>
    </section>`;

  // Concept slides
  (mod.concepts || []).forEach(c => {
    html += `
      <section>
        <span class="eyebrow">${mod.eyebrow}</span>
        <h3>${c.heading}</h3>
        <div class="card">
          <p>${renderMarkdownish(c.body)}</p>
        </div>
        ${renderDiagram(c.diagram)}
      </section>`;
  });

  // Tricks slide
  html += `
    <section>
      <span class="eyebrow">${mod.eyebrow}</span>
      <h3>⚡ Exam Tricks &amp; Shortcuts</h3>
      ${mod.tricks.map(t => `<div class="card-trick">${renderMarkdownish(t)}</div>`).join('')}
    </section>`;

  // Video slide
  html += `
    <section>
      <span class="eyebrow">${mod.eyebrow}</span>
      <h3>🎬 Watch: ${mod.video.caption}</h3>
      <div class="video-placeholder">
        <span>VIDEO PLACEHOLDER</span>
        <span>${mod.video.path}</span>
      </div>
      <p style="margin-top:0.5em;color:var(--muted);font-size:0.55em;">Drop your generated clip at this path (or swap for an R2 URL) — the slide will pick it up automatically once wired to a &lt;video&gt; tag.</p>
    </section>`;

  // Example slides
  (mod.examples || []).forEach(ex => {
    html += `
      <section>
        <span class="eyebrow">${mod.eyebrow} · Worked Example</span>
        <div class="card">
          <div class="example-q">${renderMarkdownish(ex.question)}</div>
          ${ex.steps.map(s => `<div class="example-step">→ ${renderMarkdownish(s)}</div>`).join('')}
          <div class="example-answer">${renderMarkdownish(ex.answer)}</div>
        </div>
        ${renderDiagram(ex.diagram)}
      </section>`;
  });

  // Quiz intro + quiz question slides (vertical stack)
  let quizInner = `
      <section>
        <span class="eyebrow">${mod.eyebrow}</span>
        <h3>📝 Mastery Check — ${mod.quiz.length} Questions</h3>
        <p style="color:var(--muted)">Answer each question. Wrong answers show exactly why — read them, they're the fastest way to fix the gap.</p>
      </section>`;
  mod.quiz.forEach((q, i) => {
    const uid = `${mod.moduleId}_q${i}`;
    window.QUIZ_DATA[uid] = q;
    quizInner += quizSlideHTML(q, i, uid);
  });

  html += quizInner;

  return html;
}

async function buildDeck(){
  const res = await fetch('content.json');
  const data = await res.json();

  let out = '';

  // Title slide
  out += `
    <section data-background-color="#10142A">
      <span class="eyebrow">Class XI · Chapter 1</span>
      <h1>${data.courseTitle}</h1>
      <p class="hook" style="margin-top:1.2em;">Six focused modules. Each one ends with a mastery check.<br>Get every trap-question right before you move on.</p>
    </section>`;

  data.modules.forEach(mod => {
    out += `<section>${moduleSlidesHTML(mod)}</section>`;
  });

  // Mixed test
  const mt = data.mixedTest;
  let mixedInner = `
    <section>
      <span class="eyebrow">${mt.eyebrow}</span>
      <h2>${mt.title}</h2>
      <p style="color:var(--muted)">${mt.questions.length} questions pulled across all six modules. This is your exam-day simulation.</p>
    </section>`;
  mt.questions.forEach((q, i) => {
    const uid = `MIXED_q${i}`;
    window.QUIZ_DATA[uid] = q;
    mixedInner += quizSlideHTML(q, i, uid);
  });
  out += `<section>${mixedInner}</section>`;

  // Closing slide
  out += `
    <section data-background-color="#10142A">
      <h2>🎓 Done!</h2>
      <p>Revisit any module whose mastery check score felt shaky — the tricks slide is your 2-minute revision card.</p>
      <p class="score-badge">Good luck for the exam.</p>
    </section>`;

  document.getElementById('slides').innerHTML = out;

  Reveal.initialize({
    hash: true,
    controls: true,
    progress: true,
    center: false,
    slideNumber: 'c/t',
    transition: 'slide',
    width: 1100,
    height: 720,
    margin: 0.05,
    katex: {
      version: '0.16.9',
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      ignoredTags: ['script','noscript','style','textarea','pre']
    },
    plugins: [ RevealMath.KaTeX, RevealNotes ]
  }).then(() => {
    updateVennProgress();
  });
}

function updateVennProgress(){
  const total = Object.keys(window.QUIZ_DATA).length;
  const done = Object.keys(progress).filter(k => window.QUIZ_DATA[k]).length;
  const correct = Object.keys(progress).filter(k => window.QUIZ_DATA[k] && progress[k] === 1).length;
  const ratio = total ? correct/total : 0;
  const b = document.getElementById('venn-b');
  b.style.strokeDasharray = `${Math.round(ratio*107)} 107`;
}

buildDeck();
</script>
</body>
</html>
