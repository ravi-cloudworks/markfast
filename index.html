<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mark-fast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10142A; --panel:#181D3B; --panel-2:#20264A;
    --text:#EEEFF7; --muted:#9FA3C4; --gold:#E8B84B; --teal:#5FD4C4;
    --line: rgba(255,255,255,0.08); --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; background: var(--ink); color: var(--text); font-family: 'Inter', sans-serif; min-height:100%; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 8vh 1.5rem 4rem; }
  .brand { display:flex; align-items:center; }
  .brand img { height: 42px; width: auto; display:block; }
  .tagline {
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gold); margin: 1.6rem 0 0.6rem;
  }
  h1 { font-family:'Fraunces', serif; font-weight:600; font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 0.4rem; line-height:1.15; }
  .sub { color: var(--muted); font-size: 0.95rem; max-width: 46ch; margin-bottom: 2.4rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  a.card {
    display:block; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1.4rem 1.3rem; text-decoration:none; color: inherit; transition: border-color .15s ease, transform .15s ease;
  }
  a.card:hover { border-color: var(--teal); transform: translateY(-2px); }
  .card .k { font-family:'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing:0.1em; text-transform:uppercase; color: var(--teal); }
  .card h2 { font-family:'Fraunces', serif; font-weight:600; font-size: 1.25rem; margin: 0.35em 0 0.25em; }
  .card p { color: var(--muted); font-size: 0.82rem; margin:0; line-height:1.4; }
  footer { margin-top: 3rem; color: var(--muted); font-size: 0.72rem; font-family:'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><img src="assets/logo.png" alt="Mark Fast"></div>
  <div class="tagline">Pick your class</div>
  <h1>Exam-ready, one chapter at a time.</h1>
  <p class="sub">Concept decks, book-back questions, and previous-year questions — built to match how your board exam actually asks them.</p>

  <div class="grid">
    <a class="card" href="class-11.html">
      <span class="k">Grade</span>
      <h2>Class 11</h2>
      <p>Mathematics — Chapter 1: Sets, and more chapters on the way.</p>
    </a>
  </div>

  <footer>mark-fast</footer>
</div>
</body>
</html>
