<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mark-fast — Class 11</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10142A; --panel:#181D3B; --panel-2:#20264A;
    --text:#EEEFF7; --muted:#9FA3C4; --gold:#E8B84B; --teal:#5FD4C4;
    --line: rgba(255,255,255,0.08); --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; background: var(--ink); color: var(--text); font-family: 'Inter', sans-serif; min-height:100%; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 6vh 1.5rem 4rem; }
  .crumbs { font-family:'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-bottom: 1.4rem; display:flex; align-items:center; gap:0.5em; }
  .crumbs a { color: var(--teal); text-decoration:none; display:flex; align-items:center; }
  .crumbs img { height: 20px; width: auto; display:block; }
  .crumbs a:hover { text-decoration:underline; }
  h1 { font-family:'Fraunces', serif; font-weight:600; font-size: clamp(1.6rem, 4vw, 2.2rem); margin: 0 0 0.6rem; }
  .sub { color: var(--muted); font-size: 0.9rem; max-width: 46ch; margin-bottom: 2.2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  a.card {
    display:block; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1.4rem 1.3rem; text-decoration:none; color: inherit; transition: border-color .15s ease, transform .15s ease;
  }
  a.card:hover { border-color: var(--teal); transform: translateY(-2px); }
  .card .k { font-family:'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing:0.1em; text-transform:uppercase; color: var(--teal); }
  .card h2 { font-family:'Fraunces', serif; font-weight:600; font-size: 1.2rem; margin: 0.35em 0 0.25em; }
  .card p { color: var(--muted); font-size: 0.8rem; margin:0; line-height:1.4; }
</style>
</head>
<body>
<div class="wrap">
  <div class="crumbs"><a href="index.html"><img src="assets/logo.png" alt="Mark Fast"></a> &nbsp;▸&nbsp; Class 11</div>
  <h1>Class 11 — Subjects</h1>
  <p class="sub">Choose a subject to see its chapters.</p>

  <div class="grid">
    <a class="card" href="class-11-math.html">
      <span class="k">Subject</span>
      <h2>Mathematics</h2>
      <p>1 chapter live — Sets. More chapters coming soon.</p>
    </a>
  </div>
</div>
</body>
</html>
